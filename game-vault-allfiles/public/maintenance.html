<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Site Under Maintenance - Game Vault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .container {
            text-align: center;
            padding: 60px 40px;
            max-width: 600px;
        }
        .icon { font-size: 80px; margin-bottom: 30px; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.1); } }
        h1 { font-size: 42px; margin-bottom: 15px; background: linear-gradient(135deg, #667eea, #764ba2); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { font-size: 18px; color: #aaa; margin-bottom: 30px; line-height: 1.6; }
        .message-box {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 30px;
            font-size: 16px;
            color: #ddd;
        }
        .back-btn {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white; border: none; padding: 12px 30px;
            border-radius: 8px; font-size: 16px; cursor: pointer;
            margin-top: 10px;
        }
        .back-btn:hover { opacity: 0.9; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔧</div>
        <h1>Under Maintenance</h1>
        <p>Game Vault is currently undergoing maintenance.</p>
        <div class="message-box" id="maintenanceMessage">
            Please check back soon!
        </div>
        <button class="back-btn" onclick="window.location.reload()">🔄 Check Again</button>
    </div>
    <script>
        fetch('/api/maintenance-message').then(r => r.json()).then(data => {
            if (data.message) document.getElementById('maintenanceMessage').textContent = data.message;
        }).catch(() => {});
    </script>
</body>
</html>
