<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Banned - Game Vault</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            display: flex; align-items: center; justify-content: center;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }
        .container { text-align: center; padding: 60px 40px; max-width: 600px; }
        .icon { font-size: 80px; margin-bottom: 30px; }
        h1 { font-size: 42px; margin-bottom: 15px; color: #ff6b6b; }
        p { font-size: 18px; color: #aaa; margin-bottom: 20px; line-height: 1.6; }
        .info-box {
            background: rgba(255,107,107,0.1);
            border: 1px solid rgba(255,107,107,0.3);
            border-radius: 12px;
            padding: 20px 30px;
            margin-bottom: 20px;
            font-size: 15px;
            color: #ddd;
            text-align: left;
        }
        .info-box strong { color: #ff6b6b; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔨</div>
        <h1>You're Banned</h1>
        <p>Your access key has been temporarily banned from Game Vault.</p>
        <div class="info-box">
            <div><strong>Reason:</strong> <span id="reason">No reason given</span></div>
            <div style="margin-top:10px;"><strong>Expires:</strong> <span id="expires">Unknown</span></div>
        </div>
        <p style="font-size:14px;color:#666;">If you believe this is a mistake, contact the site administrator.</p>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        const reason = params.get('reason');
        const expires = params.get('expires');
        if (reason) document.getElementById('reason').textContent = reason;
        if (expires) document.getElementById('expires').textContent = new Date(expires).toLocaleString();
    </script>
</body>
</html>
